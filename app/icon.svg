<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a0c14"/>
      <stop offset="1" stop-color="#05060a"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00d4ff"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="mark" x1="14" y1="14" x2="50" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#67e8ff"/>
