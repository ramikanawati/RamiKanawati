  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#bg)"/>
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#glow)"/>
  <rect x="2.5" y="2.5" width="59" height="59" rx="13.5" fill="none" stroke="url(#stroke)" stroke-opacity=".55" stroke-width="1"/>

  <g filter="url(#soft)" opacity=".55">
    <path d="M16 16 H30 a8 8 0 0 1 0 16 H22 l10 16" fill="none" stroke="#00d4ff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M48 16 L36 30 L48 48" fill="none" stroke="#00d4ff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M36 30 L46 30" fill="none" stroke="#00d4ff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g>
    <path d="M16 16 H30 a8 8 0 0 1 0 16 H22 l10 16" fill="none" stroke="url(#mark)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M48 16 L36 30 L48 48" fill="none" stroke="url(#mark)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M36 30 L46 30" fill="none" stroke="url(#mark)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
